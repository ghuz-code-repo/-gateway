<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }} - Golden House</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .access-denied-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
        }
        
        .access-denied-icon {
            font-size: 80px;
            color: #dc3545;
            margin-bottom: 20px;
        }
        
        .access-denied-title {
            font-size: 2rem;
            color: var(--text-color);
            margin-bottom: 16px;
        }
        
        .access-denied-message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-secondary {
            background: var(--gray-600);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="access-denied-container">
        <div class="access-denied-icon">
            <i class="fas fa-lock"></i>
        </div>
        
        <h1 class="access-denied-title">Доступ запрещен</h1>
        
        <div class="access-denied-message">
            {{ if .service }}
            <p>У вас нет прав доступа к сервису <strong>{{ .service }}</strong>.</p>
            {{ else }}
            <p>У вас нет прав доступа к запрашиваемому ресурсу.</p>
            {{ end }}
            <p>Обратитесь к администратору системы для получения доступа.</p>
        </div>
        
        <div class="action-buttons">
            <a href="/menu" class="btn btn-primary">
                <i class="fas fa-home"></i>
                Вернуться в меню
            </a>
            
            {{ if .redirect }}
            <a href="/logout?redirect={{ .redirect }}" class="btn btn-secondary">
                <i class="fas fa-sign-out-alt"></i>
                Войти под другим пользователем
            </a>
            {{ end }}
        </div>
    </div>

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 50, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.1, "random": true, "anim": { "enable": true, "speed": 0.5, "opacity_min": 0.05, "sync": false } },
                "size": { "value": 3, "random": true, "anim": { "enable": false } },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "repulse" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
