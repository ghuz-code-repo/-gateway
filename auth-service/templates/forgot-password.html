<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля - Портал Golden House</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      body {
        visibility: hidden;
        opacity: 0;
        transition: opacity .05s ease-in-out;
      }
    </style>
</head>
<body>
    <script>
        (function() {
            function getCookie(name) {
                const nameEQ = name + "=";
                const ca = document.cookie.split(';');
                for(let i = 0; i < ca.length; i++) {
                    let c = ca[i];
                    while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                    if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
                }
                return null;
            }
            function getSystemTheme() {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    return 'dark';
                }
                return 'light';
            }
            const cookieTheme = getCookie('gh_theme');
            const theme = cookieTheme ? cookieTheme : getSystemTheme();
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-theme');
            } else {
                document.documentElement.classList.remove('dark-theme');
            }
            requestAnimationFrame(() => {
                document.body.style.visibility = 'visible';
                document.body.style.opacity = 1;
            });
        })();
    </script>
    <div id="particles-js"></div>
    <div class="login-page-theme-switcher-container">
        <button id="theme-switcher" title="Toggle theme"><i class="fas fa-moon"></i></button>
    </div>
    <div class="login-container">
        {{ if .success }}
        <div class="flash-message success">
            {{ .success }}
        </div>
        {{ end }}
        
        {{ if .error }}
        <div class="flash-message danger">
            {{ .error }}
        </div>
        {{ end }}
        
        <form action="/forgot-password" method="post" class="recovery-form" id="forgotPasswordForm">
            <h2><i class="fas fa-key"></i> Восстановление пароля</h2>
            <p style="text-align: center; color: var(--light-text-color); margin-bottom: 25px;">
                Введите ваш email или имя пользователя, и мы отправим вам ссылку для сброса пароля
            </p>
            
            <div class="form-group">
                <input type="text" id="identifier" name="identifier" placeholder="Email или имя пользователя" required autofocus>
            </div>
            
            <button type="submit" class="btn primary" id="submitButton">
                <i class="fas fa-paper-plane"></i>
                <span id="buttonText">Отправить ссылку</span>
            </button>
            
            <div class="back-to-login">
                <a href="/login">
                    <i class="fas fa-arrow-left"></i>
                    Вернуться к входу
                </a>
            </div>
        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="/static/js/theme-switcher.js"></script>
    <script src="/static/js/layout-adjust.js"></script>
    <script src="/static/js/mobile-menu.js"></script>
        <script>
    particlesJS('particles-js', {
        "particles": {
            "number": { "value": 120, "density": { "enable": true, "value_area": 800 } }, // Было 50, стало 120
            "color": { "value": "#c4a668" },
            "shape": { "type": "polygon", "stroke": { "width": 1, "color": "#c4a668" }, "polygon": { "nb_sides": 6 } },
            "opacity": { "value": 0.2, "random": true, "anim": { "enable": true, "speed": 0.5, "opacity_min": 0.05, "sync": false } },
            "size": { "value": 4, "random": true },
            "line_linked": { "enable": true, "distance": 180, "color": "#c4a668", "opacity": 0.15, "width": 1 },
            "move": { "enable": true, "speed": 0.8, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
        },
        "interactivity": {
            "detect_on": "canvas",
            "events": { "onhover": { "enable": true, "mode": "bubble" }, onclick: { "enable": true, "mode": "push" } },
            "modes": { "bubble": { "distance": 200, "size": 6, "duration": 2, "opacity": 0.6 } }
        },
        "retina_detect": true
    });
    </script>
    <script>
        
        // Prevent multiple form submissions
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('forgotPasswordForm');
            const submitButton = document.getElementById('submitButton');
            const buttonText = document.getElementById('buttonText');
            
            if (form && submitButton) {
                form.addEventListener('submit', function() {
                    // Disable the button and change text
                    submitButton.disabled = true;
                    submitButton.style.opacity = '0.6';
                    submitButton.style.cursor = 'not-allowed';
                    buttonText.textContent = 'Отправляем...';
                    
                    // Add spinner icon
                    const icon = submitButton.querySelector('i');
                    if (icon) {
                        icon.className = 'fas fa-spinner fa-spin';
                    }
                });
            }
        });
    </script>
</body>
</html>
