services:
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    # НЕТ ПОРТОВ НАРУЖУ! Доступ только через внутреннюю сеть
    env_file:
      - .env
    environment:
      - TZ=Asia/Tashkent
    depends_on:
      - notification-postgres
    networks:
      - notification_network  # Для доступа к БД
      - public_network       # Для приема запросов от других сервисов
      - smtp_network         # Для отправки на внешние SMTP серверы
    restart: always
    volumes:
      - ./logs:/var/log/notification-service

  notification-postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=notifications
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=notification_password
      - TZ=Asia/Tashkent
    # НЕТ ПОРТОВ НАРУЖУ! Полная изоляция БД
    volumes:
      - notification_postgres_data:/var/lib/postgresql/data
    networks:
      - notification_network
    restart: always

volumes:
  notification_postgres_data:

networks:
  # Внутренняя сеть для БД - полностью изолированная
  notification_network:
    driver: bridge
    internal: true
  
  # Публичная сеть - для приема запросов от auth-service и других сервисов
  # Подключается к существующей сети из главного docker-compose
  public_network:
    name: public_network
    external: true
  
  # SMTP сеть - для отправки на внешние SMTP серверы
  # НЕ internal - разрешаем внешние соединения
  smtp_network:
    driver: bridge
    internal: false