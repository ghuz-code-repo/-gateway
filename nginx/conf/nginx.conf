# ОСНОВНАЯ КОНФИГУРАЦИЯ NGINX
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # DNS resolver for dynamic upstream resolution
    # This allows nginx to start even if upstreams are not available
    # Docker's internal DNS server
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Логирование
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;

    # Основные настройки
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    
    # Сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting zones for auth endpoints (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth_recovery:10m rate=1r/m;

    # Включаем конфигурации из conf.d/
    include /etc/nginx/conf.d/*.conf;
}
