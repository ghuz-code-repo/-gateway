# ===================================================================
# DEFAULT CONFIGURATION - GATEWAY ENTRY POINT
# ===================================================================
# This file is the main entry point for nginx configuration.
# It includes the gateway configuration which contains all the routing rules.
# 
# Configuration structure:
# - gateway.inc: Core gateway & auth-service endpoints
# - legacy.inc: Legacy services (referal, client-service, etc.)
# - dynamic/*.conf: Auto-generated configs from service discovery
# ===================================================================

# Include the main gateway configuration
include /etc/nginx/conf.d/gateway.inc;
