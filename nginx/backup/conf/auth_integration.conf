server {
    listen 80;
    server_name localhost;

    # Auth endpoint (internal only for nginx auth_request)
    location = /auth {
        internal;
        proxy_pass http://auth-service:8080/auth-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header Authorization $http_authorization;
    }

    # Admin panel (open access for management)
    location /admin/ {
        proxy_pass http://auth-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints (open access for admin operations)
    location /api/ {
        proxy_pass http://auth-service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login page (open access)
    location /login {
        proxy_pass http://auth-service:8080/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Protected calculators service
    location /calculators/ {
        auth_request /auth;
        
        # Передаем пользовательские заголовки от auth service
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_roles $upstream_http_x_user_roles;
        
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Roles $user_roles;
        
        proxy_pass http://calculators-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Protected clients service  
    location /clients/ {
        auth_request /auth;
        
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_roles $upstream_http_x_user_roles;
        
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Roles $user_roles;
        
        proxy_pass http://client-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Protected call-center service
    location /call-center/ {
        auth_request /auth;
        
        auth_request_set $user_id $upstream_http_x_user_id; 
        auth_request_set $user_roles $upstream_http_x_user_roles;
        
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Roles $user_roles;
        
        proxy_pass http://call-center-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Protected discounts service
    location /discounts/ {
        auth_request /auth;
        
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_roles $upstream_http_x_user_roles;
        
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Roles $user_roles;
        
        proxy_pass http://discount-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Protected referal service
    location /referal/ {
        auth_request /auth;
        
        auth_request_set $user_id $upstream_http_x_user_id;
        auth_request_set $user_roles $upstream_http_x_user_roles;
        
        proxy_set_header X-User-ID $user_id;
        proxy_set_header X-User-Roles $user_roles;
        
        proxy_pass http://referal:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Default route - показываем список доступных сервисов
    location / {
        return 200 '
            <html>
            <head><title>Gateway System</title></head>
            <body style="font-family: Arial; margin: 40px;">
                <h1>🛡️ Gateway System with Centralized Authorization</h1>
                <p>Available services:</p>
                <ul>
                    <li><a href="/admin/">🔧 Admin Panel</a> - Manage users, roles, and route permissions</li>
                    <li><a href="/calculators/">📊 Calculator Service</a> - Financial calculations</li>
                    <li><a href="/clients/">👥 Client Service</a> - Client management</li>
                    <li><a href="/call-center/">📞 Call Center Service</a> - Support operations</li>
                    <li><a href="/discounts/">💰 Discount Service</a> - Pricing and discounts</li>
                    <li><a href="/referal/">🔗 Referal Service</a> - Referral management</li>
                </ul>
                <p><strong>Note:</strong> Most services require JWT authentication.</p>
                <p>Use the <a href="/admin/">Admin Panel</a> to generate test tokens.</p>
            </body>
            </html>
        ';
        add_header Content-Type text/html;
    }
}
