# Enhanced Nginx configuration for policy-based access control

server {
    listen 80;
    server_name analytics.gh.uz;
    client_max_body_size 100M;

    # Add policy evaluation headers
    add_header X-Debug-Message "Request processed by Nginx with Policy Engine" always;

    # Auth service endpoints
    location /auth/ {
        proxy_pass http://auth-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Policy API endpoints
    location /api/v1/ {
        proxy_pass http://auth-service:8080/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Enhanced verification endpoint with policy evaluation
    location = /auth/verify-policy {
        internal;
        proxy_pass http://auth-service:8080/api/v1/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Agent $http_user_agent;
        
        # Policy evaluation context
        proxy_set_header X-Request-Context '{"ip":"$remote_addr","method":"$request_method","uri":"$request_uri","time":"$time_iso8601"}';
    }

    # Legacy verification for backward compatibility
    location = /auth/verify {
        internal;
        proxy_pass http://auth-service:8080/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Referal service with enhanced policy support
    location /referal {
        # Use enhanced policy verification
        auth_request /auth/verify-policy;
        
        # Extract policy evaluation results
        auth_request_set $auth_status $upstream_status;
        auth_request_set $auth_user_name $upstream_http_x_user_name;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_admin $upstream_http_x_user_admin;
        auth_request_set $auth_user_full_name $upstream_http_x_user_full_name;
        auth_request_set $auth_user_roles $upstream_http_x_user_roles;
        auth_request_set $auth_ui_restrictions $upstream_http_x_ui_restrictions;
        auth_request_set $auth_data_filters $upstream_http_x_data_filters;
        auth_request_set $auth_policy_version $upstream_http_x_policy_version;

        proxy_pass http://referal:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Script-Name /referal;
        
        # Pass user information
        proxy_set_header X-User-Name $auth_user_name;
        proxy_set_header X-User-ID $auth_user_id;
        proxy_set_header X-User-Admin $auth_user_admin;
        proxy_set_header X-User-Full-Name $auth_user_full_name;
        proxy_set_header X-User-Full-Name-Encoding "base64";
        proxy_set_header X-User-Roles $auth_user_roles;
        
        # Pass policy evaluation results
        proxy_set_header X-UI-Restrictions $auth_ui_restrictions;
        proxy_set_header X-Data-Filters $auth_data_filters;
        proxy_set_header X-Policy-Version $auth_policy_version;
        
        # Service identification
        proxy_set_header X-Service-Name "referal";

        # Debug headers
        add_header X-Auth-Status $auth_status always;
        add_header X-Policy-Applied "true" always;
    }

    # Client service with policy support
    location /client-service {
        auth_request /auth/verify-policy;
        
        auth_request_set $auth_status $upstream_status;
        auth_request_set $auth_user_name $upstream_http_x_user_name;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_admin $upstream_http_x_user_admin;
        auth_request_set $auth_user_full_name $upstream_http_x_user_full_name;
        auth_request_set $auth_user_roles $upstream_http_x_user_roles;
        auth_request_set $auth_ui_restrictions $upstream_http_x_ui_restrictions;
        auth_request_set $auth_data_filters $upstream_http_x_data_filters;

        proxy_pass http://client-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Script-Name /client-service;
        
        # User headers
        proxy_set_header X-User-Name $auth_user_name;
        proxy_set_header X-User-ID $auth_user_id;
        proxy_set_header X-User-Admin $auth_user_admin;
        proxy_set_header X-User-Full-Name $auth_user_full_name;
        proxy_set_header X-User-Roles $auth_user_roles;
        
        # Policy headers
        proxy_set_header X-UI-Restrictions $auth_ui_restrictions;
        proxy_set_header X-Data-Filters $auth_data_filters;
        proxy_set_header X-Service-Name "client-service";
        
        add_header X-Auth-Status $auth_status always;
    }

    # Calculators service with policy support
    location /calculators {
        auth_request /auth/verify-policy;
        
        auth_request_set $auth_status $upstream_status;
        auth_request_set $auth_user_name $upstream_http_x_user_name;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_admin $upstream_http_x_user_admin;
        auth_request_set $auth_user_full_name $upstream_http_x_user_full_name;
        auth_request_set $auth_user_roles $upstream_http_x_user_roles;
        auth_request_set $auth_ui_restrictions $upstream_http_x_ui_restrictions;
        auth_request_set $auth_data_filters $upstream_http_x_data_filters;

        proxy_pass http://calculators-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Script-Name /calculators;
        
        proxy_set_header X-User-Name $auth_user_name;
        proxy_set_header X-User-ID $auth_user_id;
        proxy_set_header X-User-Admin $auth_user_admin;
        proxy_set_header X-User-Full-Name $auth_user_full_name;
        proxy_set_header X-User-Roles $auth_user_roles;
        proxy_set_header X-UI-Restrictions $auth_ui_restrictions;
        proxy_set_header X-Data-Filters $auth_data_filters;
        proxy_set_header X-Service-Name "calculators";
        
        add_header X-Auth-Status $auth_status always;
    }

    # Plan-fact service with policy support
    location /plan-fact {
        auth_request /auth/verify-policy;
        
        auth_request_set $auth_status $upstream_status;
        auth_request_set $auth_user_name $upstream_http_x_user_name;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_admin $upstream_http_x_user_admin;
        auth_request_set $auth_user_full_name $upstream_http_x_user_full_name;
        auth_request_set $auth_user_roles $upstream_http_x_user_roles;
        auth_request_set $auth_ui_restrictions $upstream_http_x_ui_restrictions;
        auth_request_set $auth_data_filters $upstream_http_x_data_filters;

        proxy_pass http://plan-fact:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Script-Name /plan-fact;
        
        proxy_set_header X-User-Name $auth_user_name;
        proxy_set_header X-User-ID $auth_user_id;
        proxy_set_header X-User-Admin $auth_user_admin;
        proxy_set_header X-User-Full-Name $auth_user_full_name;
        proxy_set_header X-User-Roles $auth_user_roles;
        proxy_set_header X-UI-Restrictions $auth_ui_restrictions;
        proxy_set_header X-Data-Filters $auth_data_filters;
        proxy_set_header X-Service-Name "plan-fact";
        
        add_header X-Auth-Status $auth_status always;
    }

    # Call center service with policy support
    location /call-center {
        auth_request /auth/verify-policy;
        
        auth_request_set $auth_status $upstream_status;
        auth_request_set $auth_user_name $upstream_http_x_user_name;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_admin $upstream_http_x_user_admin;
        auth_request_set $auth_user_full_name $upstream_http_x_user_full_name;
        auth_request_set $auth_user_roles $upstream_http_x_user_roles;
        auth_request_set $auth_ui_restrictions $upstream_http_x_ui_restrictions;
        auth_request_set $auth_data_filters $upstream_http_x_data_filters;

        proxy_pass http://call-center-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Script-Name /call-center;
        
        proxy_set_header X-User-Name $auth_user_name;
        proxy_set_header X-User-ID $auth_user_id;
        proxy_set_header X-User-Admin $auth_user_admin;
        proxy_set_header X-User-Full-Name $auth_user_full_name;
        proxy_set_header X-User-Roles $auth_user_roles;
        proxy_set_header X-UI-Restrictions $auth_ui_restrictions;
        proxy_set_header X-Data-Filters $auth_data_filters;
        proxy_set_header X-Service-Name "call-center";
        
        add_header X-Auth-Status $auth_status always;
    }

    # Discount service with policy support
    location /discount-system {
        auth_request /auth/verify-policy;
        
        auth_request_set $auth_status $upstream_status;
        auth_request_set $auth_user_name $upstream_http_x_user_name;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_admin $upstream_http_x_user_admin;
        auth_request_set $auth_user_full_name $upstream_http_x_user_full_name;
        auth_request_set $auth_user_roles $upstream_http_x_user_roles;
        auth_request_set $auth_ui_restrictions $upstream_http_x_ui_restrictions;
        auth_request_set $auth_data_filters $upstream_http_x_data_filters;

        proxy_pass http://discount-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Script-Name /discount-system;
        
        proxy_set_header X-User-Name $auth_user_name;
        proxy_set_header X-User-ID $auth_user_id;
        proxy_set_header X-User-Admin $auth_user_admin;
        proxy_set_header X-User-Full-Name $auth_user_full_name;
        proxy_set_header X-User-Roles $auth_user_roles;
        proxy_set_header X-UI-Restrictions $auth_ui_restrictions;
        proxy_set_header X-Data-Filters $auth_data_filters;
        proxy_set_header X-Service-Name "discount-system";
        
        add_header X-Auth-Status $auth_status always;
    }

    # Menu endpoint (accessible to all authenticated users)
    location /menu {
        proxy_pass http://auth-service:8080/menu;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Admin endpoints (for authenticated admins only)
    location /admin {
        proxy_pass http://auth-service:8080/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        auth_request /auth/verify;
        auth_request_set $auth_status $upstream_status;
        
        return 200 '{"status":"healthy","auth_status":"$auth_status","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # Policy sync endpoint for services
    location /sync-policies {
        auth_request /auth/verify;
        auth_request_set $auth_user_admin $upstream_http_x_user_admin;
        
        # Only allow admin users
        if ($auth_user_admin != "true") {
            return 403;
        }
        
        proxy_pass http://auth-service:8080/api/v1/sync-policies;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default location for handling root requests
    location / {
        return 302 /auth/login;
    }

    # Error pages with policy context
    error_page 401 /auth/login;
    error_page 403 @forbidden;
    error_page 404 @not_found;

    location @forbidden {
        internal;
        return 403 '{"error":"Access denied by policy","timestamp":"$time_iso8601","uri":"$request_uri"}';
        add_header Content-Type application/json;
    }

    location @not_found {
        internal;
        return 404 '{"error":"Resource not found","timestamp":"$time_iso8601","uri":"$request_uri"}';
        add_header Content-Type application/json;
    }
}
