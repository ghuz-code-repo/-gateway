<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка 50x - Внутренняя ошибка сервера</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            margin: 0;
            color: #D29F66;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        .error-message {
            font-size: 24px;
            margin: 20px 0;
        }
        .error-description {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        .home-link {
            display: inline-block;
            padding: 12px 24px;
            background: #D29F66;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .home-link:hover {
            background: #B8854D;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">50x</h1>
        <h2 class="error-message">Внутренняя ошибка сервера</h2>
        <p class="error-description">
            Произошла временная ошибка сервера. Пожалуйста, попробуйте позже.
        </p>
        <a href="/" class="home-link">На главную</a>
    </div>
</body>
</html>
