services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
      - calculators-service
      - client-service
      - call-center-service
      - discount-service
      - referal
    volumes:
      - ./nginx/conf:/etc/nginx/conf
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - public_network
      - auth_network
      - service_network
    restart: always

  auth-service:
    build: ./auth-service
    env_file:
      - ./auth-service/.env
    depends_on:
      - mongo
    networks:
      - auth_network
      - data_network
      - public_network
    volumes:
      - ./auth-service/data:/data
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=authdb
      - JWT_SECRET=your-super-secret-key-change-in-production
    restart: always

  mongo:
    image: mongo:6
    restart: always
    networks:
      - data_network
    volumes:
      - ./mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=authdb

  # Your existing Flask services with centralized authorization
  calculators-service:
    build: ../calculators-service
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///calculators.db
      - SERVER_NAME=localhost
    networks:
      - service_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client-service:
    build: ../client-service
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///clients.db
      - SERVER_NAME=localhost
    networks:
      - service_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  call-center-service:
    build: ../call-center-service
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///callcenter.db
      - SERVER_NAME=localhost
    networks:
      - service_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  discount-service:
    build: ../discount-service
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///discounts.db
      - SERVER_NAME=localhost
    networks:
      - service_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  referal:
    build: ../referal
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///referal.db
      - SERVER_NAME=localhost
    networks:
      - service_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  public_network:
    name: public_network
  auth_network:
    name: auth_network
    internal: true
  service_network:
    name: service_network
    internal: true
  data_network:
    name: data_network
    internal: true
