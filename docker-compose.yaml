services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: gateway-nginx-1
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
    volumes:
      - ./nginx/conf:/etc/nginx/conf
      - ./nginx/certs:/etc/nginx/certs
      - nginx_dynamic_config:/etc/nginx/conf.d/dynamic  # For dynamic service configs
    environment:
      - TZ=Asia/Tashkent
    networks:
      - public_network
      - auth_network
      - service_network
    restart: always

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file:
      - ./auth-service/.env
    depends_on:
      - mongo
    networks:
      - auth_network
      - data_network
      - public_network
    volumes:
      - ./auth-service/data:/root/data
      - ./auth-service/static:/root/static
      - ./auth-service/templates:/root/templates
      - nginx_dynamic_config:/etc/nginx/conf.d/dynamic  # Shared volume for nginx configs
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Access to Docker for nginx reload
    environment:
      - TZ=Asia/Tashkent
      - NOTIFICATION_SERVICE_URL=http://notification-service:8082
      - NGINX_CONTAINER_NAME=gateway-nginx-1
      - NGINX_DYNAMIC_CONFIG_PATH=/etc/nginx/conf.d/dynamic/services.conf
    restart: always

  mongo:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"  # Возвращаем для разработки
    networks:
      - data_network
      - public_network  # Возвращаем для внешнего доступа
    volumes:
      - ./mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=authdb
      - TZ=Asia/Tashkent

volumes:
  nginx_dynamic_config:  # Shared volume for dynamic nginx configs

networks:
  # Публичная сеть - для nginx и всех сервисов
  public_network:
    name: public_network
    driver: bridge
  
  # Внутренние сети
  auth_network:
    name: auth_network
    driver: bridge
  
  service_network:
    name: service_network
    driver: bridge
  
  data_network:
    name: data_network
    driver: bridge
