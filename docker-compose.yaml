services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: gateway-nginx-1
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
    volumes:
      # Mount main nginx config
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount conf.d configs
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf/gateway.inc:/etc/nginx/conf.d/gateway.inc:ro
      - ./nginx/conf/legacy.inc:/etc/nginx/conf.d/legacy.inc:ro
      # Mount dynamic configs (writable for service discovery)
      - nginx_dynamic_config:/etc/nginx/conf.d/dynamic
      # Mount certs
      - ./nginx/certs:/etc/nginx/certs:ro
    environment:
      - TZ=Asia/Tashkent
    networks:
      - public_network
      - auth_network
      - service_network
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file:
      - ./auth-service/.env
    depends_on:
      - mongo
    networks:
      - auth_network
      - data_network
      - public_network
    volumes:
      - ./auth-service/data:/root/data
      - ./auth-service/static:/root/static
      - ./auth-service/templates:/root/templates
      - nginx_dynamic_config:/etc/nginx/conf.d/dynamic  # Shared volume for nginx configs
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Access to Docker for nginx reload
    environment:
      - TZ=Asia/Tashkent
      - NOTIFICATION_SERVICE_URL=http://notification-service:80
      - NGINX_CONTAINER_NAME=gateway-nginx-1
      - NGINX_DYNAMIC_CONFIG_DIR=/etc/nginx/conf.d/dynamic
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:6
    restart: always
    networks:
      - data_network
    volumes:
      - ./mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=authdb
      - TZ=Asia/Tashkent
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  monitoring-service:
    build:
      context: ./monitoring-service
      dockerfile: Dockerfile
    container_name: gateway-monitoring-service
    env_file:
      - ./monitoring-service/.env
    depends_on:
      - auth-service
    networks:
      - service_network
      - public_network
    environment:
      - TZ=Asia/Tashkent
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  dozzle:
    image: amir20/dozzle:latest
    container_name: gateway-dozzle
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_FILTER=name=gateway-*,name=referal,name=notification*,name=monitoring*
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_BASE=/logs
      - TZ=Asia/Tashkent
    networks:
      - public_network
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  nginx_dynamic_config:  # Shared volume for dynamic nginx configs

networks:
  # Публичная сеть - для nginx и всех сервисов
  public_network:
    name: public_network
    driver: bridge
  
  # Внутренние сети
  auth_network:
    name: auth_network
    driver: bridge
  
  service_network:
    name: service_network
    driver: bridge
  
  data_network:
    name: data_network
    driver: bridge
