services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile

    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
    volumes:
      - ./nginx/conf:/etc/nginx/conf
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - public_network
      - auth_network
      - service_network
    restart: always

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file:
      - ./auth-service/.env
    depends_on:
      - mongo
    networks:
      - auth_network
      - data_network
      - public_network
    volumes:
      - ./auth-service/data:/root/data
      - ./auth-service/static:/root/static
      - ./auth-service/templates:/root/templates

    restart: always

  mongo:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    networks:
      - data_network
      - public_network
    volumes:
      - ./mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=authdb

networks:
  public_network:
    name: public_network
  auth_network:
    name: auth_network
    internal: true
  service_network:
    name: service_network
    internal: true
  data_network:
    name: data_network
    internal: true
