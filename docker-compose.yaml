services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile

    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
    volumes:
      - ./nginx/conf:/etc/nginx/conf
      - ./nginx/certs:/etc/nginx/certs
    environment:
      - TZ=Asia/Tashkent
    networks:
      - public_network
      - auth_network
      - service_network
    restart: always

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file:
      - ./auth-service/.env
    depends_on:
      - mongo
      - notification-service
    networks:
      - auth_network
      - data_network
      - public_network
      - notification_network
    volumes:
      - ./auth-service/data:/root/data
      - ./auth-service/static:/root/static
      - ./auth-service/templates:/root/templates
    environment:
      - TZ=Asia/Tashkent
      - NOTIFICATION_SERVICE_URL=http://notification-service:8082
    restart: always

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    env_file:
      - ./notification-service/.env
    # Убираем внешний порт - доступ только изнутри
    depends_on:
      - notification-postgres
    networks:
      - notification_network  # Только внутренняя сеть
    environment:
      - TZ=Asia/Tashkent
    restart: always
    volumes:
      - ./notification-service/logs:/var/log/notification-service

  notification-postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=notifications
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=notification_password
      - TZ=Asia/Tashkent
    volumes:
      - notification_postgres_data:/var/lib/postgresql/data
    networks:
      - notification_network
    restart: always

  mongo:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"  # Возвращаем для разработки
    networks:
      - data_network
      - public_network  # Возвращаем для внешнего доступа
    volumes:
      - ./mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=authdb
      - TZ=Asia/Tashkent

volumes:
  notification_postgres_data:

networks:
  public_network:
    name: public_network
  auth_network:
    name: auth_network
    internal: true
  service_network:
    name: service_network
    internal: true
  data_network:
    name: data_network
    internal: true
  notification_network:
    name: notification_network
    # Не internal - нужен доступ к внешним SMTP серверам
