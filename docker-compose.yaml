services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile

    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
    volumes:
      - ./nginx/conf:/etc/nginx/conf
      - ./nginx/certs:/etc/nginx/certs
    environment:
      - TZ=Asia/Tashkent
    networks:
      - public_network
      - auth_network
      - service_network
    restart: always

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file:
      - ./auth-service/.env
    depends_on:
      - mongo
    networks:
      - auth_network
      - data_network
      - public_network
    volumes:
      - ./auth-service/data:/root/data
      - ./auth-service/static:/root/static
      - ./auth-service/templates:/root/templates
    environment:
      - TZ=Asia/Tashkent
      - NOTIFICATION_SERVICE_URL=http://notification-service:8082
    restart: always

  # notification-service и notification-postgres
  # Теперь запускаются отдельным docker-compose.yml
  # в папке ./notification-service/
  # Это позволяет пересобирать их независимо

  mongo:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"  # Возвращаем для разработки
    networks:
      - data_network
      - public_network  # Возвращаем для внешнего доступа
    volumes:
      - ./mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=authdb
      - TZ=Asia/Tashkent

networks:
  # Публичная сеть - shared между gateway и notification-service
  # Используется для связи auth-service -> notification-service
  public_network:
    name: gateway_public_network
    driver: bridge
  
  # Внутренние сети - создаются автоматически
  auth_network:
    driver: bridge
    internal: true
  
  service_network:
    driver: bridge
    internal: true
  
  data_network:
    driver: bridge
    internal: true
