services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: gateway-nginx-1
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - auth-service
    volumes:
      # Mount main nginx config
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount conf.d configs
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf/gateway.inc:/etc/nginx/conf.d/gateway.inc:ro
      # Mount dynamic configs (writable for service discovery)
      - nginx_dynamic_config:/etc/nginx/conf.d/dynamic
      # Mount certs
      - ./nginx/certs:/etc/nginx/certs:ro
    environment:
      - TZ=Asia/Tashkent
    networks:
      - public_network      # Для приема внешних запросов
      - service_network     # Для проксирования в микросервисы
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file:
      - ./auth-service/.env
    depends_on:
      - mongo
      - docker-socket-proxy
    networks:
      - service_network     # Для общения с другими сервисами
      - data_network        # Для доступа к MongoDB
    volumes:
      - ./auth-service/data:/root/data
      - ./auth-service/static:/root/static
      - ./auth-service/templates:/root/templates
      - nginx_dynamic_config:/etc/nginx/conf.d/dynamic  # Shared volume for nginx configs
    environment:
      - TZ=Asia/Tashkent
      - NOTIFICATION_SERVICE_URL=http://notification-service:80
      - NGINX_CONTAINER_NAME=gateway-nginx-1
      - NGINX_DYNAMIC_CONFIG_DIR=/etc/nginx/conf.d/dynamic
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mongo:
    image: mongo:6
    restart: always
    command: ["--auth"]
    networks:
      - data_network
    volumes:
      - ./mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/01-create-app-user.js:ro
    environment:
      - MONGO_INITDB_DATABASE=authdb
      - MONGO_INITDB_ROOT_USERNAME=mongoadmin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD}
      - TZ=Asia/Tashkent
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u mongoadmin -p $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval 'db.runCommand({ping:1}).ok'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  monitoring-service:
    build:
      context: ./monitoring-service
      dockerfile: Dockerfile
    container_name: gateway-monitoring-service
    env_file:
      - ./monitoring-service/.env
    depends_on:
      - auth-service
    networks:
      - service_network     # Только внутренняя сеть сервисов
    environment:
      - TZ=Asia/Tashkent
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: gateway-docker-proxy
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=Asia/Tashkent
      # Only allow container-related operations (logs for dozzle, signal for nginx reload)
      - CONTAINERS=1
      - INFO=1          # Required for dozzle v10+ (GET /info on startup)
      - POST=1          # Required for container kill (SIGHUP for nginx reload)
      - EXEC=0          # Disabled — nginx reload uses SIGHUP signal instead
      - LOG=1           # Required for dozzle log streaming
      - EVENTS=1        # Required for dozzle real-time updates
      # Block everything else
      - IMAGES=0
      - NETWORKS=0
      - VOLUMES=0
      - BUILD=0
      - COMMIT=0
      - SWARM=0
      - NODES=0
      - SERVICES=0
      - TASKS=0
      - SECRETS=0
      - CONFIGS=0
    networks:
      - service_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  dozzle:
    image: amir20/dozzle:latest
    container_name: gateway-dozzle
    restart: always
    depends_on:
      - docker-socket-proxy
    environment:
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - DOZZLE_LEVEL=info
      # Forward proxy mode for per-service access control
      - DOZZLE_AUTH_PROVIDER=forward-proxy
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_BASE=/logs
      - TZ=Asia/Tashkent
    networks:
      - service_network     # Только внутренняя сеть (доступ через nginx)
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  nginx_dynamic_config:  # Shared volume for dynamic nginx configs

networks:
  # Публичная сеть - ТОЛЬКО для nginx (единственная точка входа извне)
  public_network:
    name: public_network
    driver: bridge
  
  # Сеть для всех микросервисов (изолирована от внешнего мира через nginx)
  service_network:
    name: service_network
    driver: bridge
    internal: true  # Изолирована от внешнего мира
  
  # Сеть для сервисов, которым нужен выход в интернет (SMTP, Telegram API)
  egress_network:
    name: egress_network
    driver: bridge
  
  # Изолированная сеть для auth-service и MongoDB
  data_network:
    name: data_network
    driver: bridge
    internal: true  # Полностью изолирована - только auth-service имеет доступ
